name: NodeSeek Daily Check-in

on:
  schedule:
    # UTC 23:00 = CST 07:00 每天
    - cron: '0 23 * * *'
  workflow_dispatch:  # 支持手动触发

jobs:
  checkin:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install chromium
          sudo apt-get update && sudo apt-get install -y libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libdbus-1-3 libxcb1 libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libgbm1 libpango-1.0-0 libcairo2 libasound2 2>/dev/null || true

      - name: Run check-in
        env:
          NODESEEK_USERNAME: ${{ secrets.NODESEEK_USERNAME }}
          NODESEEK_PASSWORD: ${{ secrets.NODESEEK_PASSWORD }}
          NODESEEK_COOKIE_FILE: /tmp/nodeseek_cookies.json
        run: python nodeseek_checkin.py

      - name: Check result
        run: |
          echo "签到结果见上一步输出"
